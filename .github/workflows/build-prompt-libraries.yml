name: Build prompt libraries and site

on:
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - "BUILD_AND_GENERATOR_GUIDE.md"
      - "UPDATE-CHECKLISTS.md"
      - "CONTRIBUTING.md"
      - "SOURCE_MATERIAL_INDEX_EXPLAINER.md"
      - "project-docs/**"
      - "CHANGELOG.md"
      - ".github/workflows/build-prompt-libraries.yml"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "BUILD_AND_GENERATOR_GUIDE.md"
      - "UPDATE-CHECKLISTS.md"
      - "CONTRIBUTING.md"
      - "SOURCE_MATERIAL_INDEX_EXPLAINER.md"
      - "project-docs/**"
      - "CHANGELOG.md"
      - ".github/workflows/build-prompt-libraries.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build, check and validate generated outputs
        run: python scripts/build_all.py --ci
      - name: Fail if generated files are out of date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are out of date. Run python scripts/build_all.py --ci and commit the result."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi
