name: Build prompt libraries and site

on:
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/build-prompt-libraries.yml"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build prompt libraries from src/ and verify they are current
        run: python scripts/build_prompt_libraries.py --ci
      - name: Build the source-material library and verify it is current
        run: |
          python scripts/build_source_material_library.py
          python scripts/build_source_material_library.py --check
      - name: Rebuild the website
        run: |
          python scripts/build_site_main.py
          python scripts/build_site_pages.py
          python scripts/build_site_guides.py
          python scripts/build_examples.py
      - name: Fail if generated files are out of date
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are out of date. Run the build scripts and commit the result."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi
