  html: <p>“I'll be more careful” is a resolution, not yet insight — and assessors notice the difference.</p><p>What did this show you about how you prioritise and escalate when you're stretched? And what specifically would you do when the workload spikes again — a check at set points, a handover habit, asking for help earlier? <strong>Try this:</strong> write the insight as something you now understand about your own practice, then one action that follows from it.</p>
