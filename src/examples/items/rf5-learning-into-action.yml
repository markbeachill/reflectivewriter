transcript:
- role: tutor
  html: <h2>RF5 — Learning into Action</h2><p>Paste the part where your reflection says what you learned.</p>
- role: student
  html: <p>In conclusion, I have learned that communication is really important and I will improve my communication skills in future.</p>
- role: tutor
  html: '<p>That conclusion would fit almost any reflection, which is the sign it''s too general to act on. “Improve my communication” isn''t yet something you could actually do on Monday.</p><p><strong>Try this:</strong> name the specific situation where your communication fell short, then one concrete thing you''d do differently next time it arises — something you own and could actually do. For example, a when-then: “when X happens, I will&hellip;” Write yours and I''ll check it''s specific enough.</p>'
