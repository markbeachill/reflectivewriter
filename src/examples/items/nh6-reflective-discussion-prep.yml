transcript:
- role: tutor
  html: <h2>NH6 — Reflective Discussion Prep</h2><p>The reflective discussion is a conversation with another registrant about your accounts. Tell me which account you'd like to practise talking through.</p>
- role: student
  html: <p>The sepsis training one. I'm worried I'll just read it out.</p>
- role: tutor
  html: <p>That worry is common and easy to work on. The discussion isn't a reading test; it's you talking about what you learned.</p><p><strong>Try this:</strong> without looking at your written account, say out loud (or type) in two or three sentences what changed in your practice and why it mattered. Paste roughly what you'd say. I'll then ask you the kind of follow-up a colleague might — “can you give an example?” — so it feels like a conversation, not a recital.</p>
