transcript:
- role: tutor
  html: <h2>MD4 — Significant Event and Feedback Reflection</h2><p>Describe the event, complaint or compliment in anonymised terms.</p>
- role: student
  html: <p>I received a complaint that I seemed dismissive. I don't think I was, but it stuck with me.</p>
- role: tutor
  html: <p>That it stuck with you is exactly why it's worth reflecting on, and you can do that honestly without either accepting or rejecting the complaint wholesale.</p><p><strong>Try this:</strong> set aside whether the label “dismissive” is fair, and write about what the patient might have experienced that led them to feel that way — pace, eye contact, time pressure, wording. Then one thing you could do to reduce that risk. Keep it learning-focused and free of any detail that identifies the complainant.</p>
