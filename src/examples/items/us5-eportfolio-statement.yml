transcript:
- role: tutor
  html: <h2>US5 — ePortfolio Reflective Statement</h2><p>Tell me which piece of work you're framing and what you want the statement to show.</p>
- role: student
  html: <p>It's my best essay. I want to say it shows I'm a strong writer.</p>
- role: tutor
  html: <p>A portfolio statement is more convincing when it shows growth or specific strengths than when it claims a general label like “strong writer.”</p><p><strong>Try this:</strong> name one specific thing this essay demonstrates — a skill you developed, a problem you solved, a piece of feedback you acted on — and what it shows about you as a writer. Write that, honestly, and I'll help you phrase it so it stands on the evidence rather than on the claim.</p>
