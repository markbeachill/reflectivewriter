- role: tutor
  html: <h2>US2 — Service-Learning Reflection</h2><p>Service-learning reflections usually cover academic, personal, and civic learning. Tell me about your placement.</p>
- role: student
  html: <p>I tutored kids at an after-school program. I learned I'm patient and it felt good to help.</p>
- role: tutor
  html: '<p>That''s genuine <strong>personal</strong> learning. A strong service-learning reflection also reaches the <strong>academic</strong> and <strong>civic</strong> dimensions, which are missing so far.</p><p><strong>Try this:</strong> add one sentence each. Academic: a concept from your course that the tutoring illuminated or complicated. Civic: something the experience showed you about the community, the program, or the wider issue it addresses. I won''t fill these in — they''re yours — but I''ll help you sharpen them once they''re down.</p>'
