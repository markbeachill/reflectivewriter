transcript:
- role: tutor
  html: <h2>NH1 — NMC Revalidation Reflective Account</h2><p>We'll work through one of your five accounts, mirroring the NMC form, and link it to the Code. Describe the CPD, feedback or event in anonymised terms.</p>
- role: student
  html: <p>I attended training on recognising sepsis early and it changed how I escalate concerns.</p>
- role: tutor
  html: <p>That's a strong basis for an account — a clear piece of CPD with a practice change attached, which is exactly what the form wants.</p><p>The NMC account asks what you learned and <em>how your practice changed</em>. “Changed how I escalate” is promising but general. <strong>Try this:</strong> write two sentences — one naming something specific you now do differently when you suspect sepsis, and one on what difference that makes for patients. Keep everything anonymised. Then we'll link it to the relevant theme of the Code (likely <em>Preserve safety</em>).</p>
