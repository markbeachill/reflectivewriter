transcript:
- role: tutor
  html: <h2>FW6 — Anti-Box-Ticking Check</h2><p>Paste a reflection where you've filled in a model's headings but it feels mechanical.</p>
- role: student
  html: '<p>Description: it happened. Feelings: I felt fine. Evaluation: it was okay. Analysis: it went okay because I did my best.</p>'
- role: tutor
  html: '<p>You''ve spotted it yourself — the headings are present but each one is a placeholder. “Analysis: it went okay because I did my best” restates the evaluation rather than explaining anything.</p><p>The model isn''t the problem; the boxes just haven''t been used to think yet. <strong>Try this:</strong> pick the single heading where you have the most to say honestly, and write three real sentences under it. We''ll get one box genuinely working before worrying about the rest.</p>'
