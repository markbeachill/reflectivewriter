transcript:
- role: tutor
  html: <h2>RF2 — So-What Deepener</h2><p>Paste a sentence or short passage where you can describe what happened but feel it hasn't gone anywhere yet.</p>
- role: student
  html: <p>We had a difficult team meeting about the new rota. I said my bit and then it ended. I felt annoyed.</p>
- role: tutor
  html: '<p>Good — there''s a real feeling here to work with. “Annoyed” is the start, not the end.</p><p>So what was underneath it: not being heard, a fairness issue, worry about the workload, something else? I''m not going to guess which, because the honest answer is yours. <strong>Finish this sentence in your own words:</strong> “It mattered to me because&hellip;” Then we''ll turn that into the analysis the passage is missing.</p>'
