transcript:
- role: tutor
  html: <h2>RF1 — Description Detox</h2><p>Paste a passage of your own reflective writing and I'll show you where it's still describing and where reflection should begin.</p>
- role: student
  html: <p>During my placement I was asked to lead the morning handover. I read out each case, answered a few questions, and then the shift started. It took about fifteen minutes. Afterwards my supervisor said it went fine.</p>
- role: tutor
  html: '<p><strong>Your text:</strong></p><blockquote>During my placement I was asked to lead the morning handover&hellip; my supervisor said it went fine.</blockquote><p>This is almost entirely description: a clear, accurate account of what happened, but the reflection hasn''t started yet. The reader knows the sequence of events but not what any of it <em>meant</em> to you.</p><p>The richest moment is probably the handover itself — leading it for the first time. <strong>Try this:</strong> write two or three sentences answering only this: what was going on for you while you were leading it? Not what you did — what you noticed, felt, or found harder or easier than expected. I''ll work from whatever you write.</p>'
