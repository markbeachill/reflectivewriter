transcript:
- role: tutor
  html: <h2>US3 — Reflective Journal Coach</h2><p>Paste a recent entry. I can also help you notice patterns across entries over time.</p>
- role: student
  html: <p>Today was busy. Lots going on in the project. Felt tired but okay. More tomorrow.</p>
- role: tutor
  html: '<p>That''s a log more than a reflection — it records the day but doesn''t yet think about it. Journals get their value when one small thing is examined.</p><p><strong>Try this:</strong> pick a single moment from “lots going on” and write three sentences: what happened, what you made of it, and what you''ll carry into tomorrow. Over a few entries I can then help you spot recurring themes — but only from what you actually write.</p>'
