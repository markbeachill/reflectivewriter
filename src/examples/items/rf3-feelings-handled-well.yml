transcript:
- role: tutor
  html: <h2>RF3 — Feelings, Handled Well</h2><p>Paste the part where you write about how you felt.</p>
- role: student
  html: <p>Honestly the whole thing was a disaster and the other student didn't pull their weight at all, which was so frustrating and typical.</p>
- role: tutor
  html: <p>The feeling is clear and it's fine to name frustration. Two things to adjust so this works as reflection rather than venting.</p><p>First, it currently aims outward at the other person (“didn't pull their weight&hellip; typical”). Reflection works better when it stays with your own experience. Second, “disaster” names a verdict, not a feeling.</p><p><strong>Try this:</strong> rewrite one sentence that names what <em>you</em> felt at a specific moment, and what that feeling tells you. Keep the other person anonymous and avoid character judgements. Paste it and I'll review.</p>
