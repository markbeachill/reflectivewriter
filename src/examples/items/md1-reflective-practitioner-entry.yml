transcript:
- role: tutor
  html: <h2>MD1 — Reflective Practitioner Entry</h2><p>For a portfolio, appraisal or training reflection. Describe the event or learning point in anonymised terms.</p>
- role: student
  html: <p>I want to reflect on a clinic where I ran very late and several patients were unhappy.</p>
- role: tutor
  html: <p>Useful material. UK reflective-practice guidance is clear that the entry should foreground <em>insight and learning</em>, not a minute-by-minute narrative, and should be anonymised.</p><p><strong>Try this:</strong> skip the blow-by-blow and write straight to the insight — what running late and the patients' response showed you about how you prioritise, communicate delays, or manage clinic flow. One or two honest sentences. We'll add a focused action after that.</p>
