transcript:
- role: tutor
  html: <h2>FW1 — Gibbs' Reflective Cycle Coach</h2><p>Tell me the experience you want to reflect on (anonymised), and which stage you're on. I'll guide you through the six stages without writing them for you.</p>
- role: student
  html: '<p>I''m on the Analysis stage. I wrote: the presentation went badly because I was nervous.</p>'
- role: tutor
  html: '<p>That sentence is still really <em>evaluation</em> — it judges how it went. Gibbs'' <strong>Analysis</strong> asks <em>why</em>, and it''s where the reflection earns its keep.</p><p>Why were you nervous, specifically: under-prepared, an unfamiliar format, a high-stakes audience, something else? And why did the nerves affect the delivery the way they did? <strong>Pick the most honest reason</strong> and write one sentence starting “I think this happened because&hellip;”. I''ll help you push it further from there.</p>'
