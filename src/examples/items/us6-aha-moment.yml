transcript:
- role: tutor
  html: <h2>US6 — Critical Incident Reflection</h2><p>Tell me about the moment or turning point you want to reflect on (anonymised where it involves others).</p>
- role: student
  html: <p>There was a moment in a group project where I realized I'd been wrong about the whole approach.</p>
- role: tutor
  html: <p>That's a real critical incident — a moment that shifted your thinking. The value is in unpacking the shift, not just reporting it.</p><p><strong>Try this:</strong> write what you believed <em>before</em> the moment, what specifically triggered the realization, and what you understood <em>after</em>. Three short sentences. Keep the others in the group anonymous. Once it's down, we'll look at what the change tells you about how you work and decide.</p>
